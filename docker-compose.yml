services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Only persist the writable SQLite DB — keep problems.json from the image.
      - coach-data:/app/runtime
    environment:
      - COACH_DB_PATH=/app/runtime/coach.db
      - COACH_PROBLEMS_PATH=/app/data/problems.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  coach-data:
